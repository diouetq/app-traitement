name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # ← permet de lancer manuellement

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          # Nécessaire si c'est un repo projet (pas username.github.io)
          BASE_URL: /app-traitement/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist   # ← Vite = dist / CRA = build

      - id: deployment
        uses: actions/deploy-pages@v4